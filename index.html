<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background-color: antiquewhite;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .box {
        width: 500px;
        background: rgb(255, 255, 255);
        padding: 50px;
        border-radius: 15px;
        text-align: center;
        font-family: 'Lucida Sans Unicode', Verdana, sans-serif;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
    }
</style>
</style>
</head>

<body>

<div class="box">
    <h1 class="fw-bold fs-4">LOG IN AUTHENTICATION FORM</h1>
    <p>Please fill out the following blanks to log in.</p>

    <form id="loginForm" onsubmit="return false;">
        <label>Email Address:</label>
        <input type="email" id="email" class="form-control mb-3" placeholder="Email address...">

        <label>Password:</label>
        <input type="password" id="password" class="form-control mb-3" placeholder="Password...">

        <div id="message" class="text-danger mb-3"></div>

        <div class="form-check d-flex justify-content-center mb-3">
            <input class="form-check-input me-2" type="checkbox" id="checkoutboxID" onclick="checkcheckoutboxID()">
            <label class="form-check-label" for="checkoutboxID">Remember me</label>
        </div>

        <div class="button-group">
            <button type="button" class="btn btn-dark" id="loginBtn" onclick="function_name()">Log In</button>
            <button type="reset" class="btn btn-outline-danger">Clear All</button>
        </div>
    </form>
</div>

<script>
    // Variable for tracking login attempts
    let attempt_counter = 0;

    // start with function
    function function_name(){
        // retrieve input values and message/button elements
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        let messageEl = document.getElementById("message");

        do {
            // successful credentials (same as existing check)
            if (email === "hello@gmail.com" && password === "0123456") {
                alert("Log in successful! Welcome back, Vivian J. Dela Cruz!");
                attempt_counter = 0; // reset after success
                messageEl.innerHTML = "";
                window.location.href = "notebooks.html"; // go to second page
                break; // stop loop
            } else if (email === "" || password === "") {
                alert("Please fill in all fields.");
                break;
            } else {
                attempt_counter++;
                messageEl.innerHTML = "Incorrect email and/or password. Attempt " + attempt_counter + " of 3";
            }
        } while (false);

        if (attempt_counter >= 3) {
            alert("Too many failed attempts. Login disabled.");
            document.getElementById("loginBtn").disabled = true; // lock button
        }
    }

    function checkcheckoutboxID() {
        let checkbox = document.getElementById("checkoutboxID").checked;

        if (checkbox) {
            alert("By selecting the checkbox, you agree to save your details.");
        }
    }
</script>

</body>
</html>
